<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Course Details</title>
    <style> /* COPY CSS FROM index.html */ </style>
</head>
<body>
    <nav> </nav>
    <div style="padding: 50px 10%;">
        <h1 id="title">Loading...</h1>
        <p id="details" style="margin: 20px 0; font-size: 1.1rem;"></p>
        <button class="btn btn-primary" onclick="addToCart()">Add to Cart</button>
    </div>
    <footer> </footer>
    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbzBd1StZ9jupKta-Wxrc-_kyDNwh9Tb6ybcdOQJqlSbVRuVuXv5--1-OyoqHfINJUCb/exec";
        const id = new URLSearchParams(window.location.search).get('id');
        fetch(API_URL).then(res => res.json()).then(data => {
            const c = data.find(x => x['Course ID'] == id);
            document.getElementById('title').innerText = c["Course Name"];
            document.getElementById('details').innerText = c["Full Details"];
            window.currentCourse = c["Course Name"];
        });
        function addToCart() {
            let cart = JSON.parse(localStorage.getItem('cart') || '[]');
            cart.push(window.currentCourse);
            localStorage.setItem('cart', JSON.stringify(cart));
            alert("Added to Cart!");
        }
    </script>
</body>
</html>
