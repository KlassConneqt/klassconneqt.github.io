<!DOCTYPE html>
<html lang="en">
<head>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script>(function(){ emailjs.init("a-SkplDQ-6DlInywr"); })();</script>
    <style> /* COPY CSS FROM index.html */ </style>
</head>
<body>
    <nav> </nav>
    <div style="padding: 50px 10%;">
        <h2>Cart Items</h2>
        <ul id="cart-list"></ul>
        <form id="enquiryForm">
            <input type="text" id="name" placeholder="Name" required><br>
            <input type="email" id="email" placeholder="Email" required><br>
            <input type="text" id="phone" placeholder="Phone" required><br>
            <button type="submit" class="btn btn-primary">Send Enquiry</button>
        </form>
    </div>
    <footer> </footer>
    <script>
        const cart = JSON.parse(localStorage.getItem('cart') || '[]');
        document.getElementById('cart-list').innerHTML = cart.map(c => `<li>${c}</li>`).join('');
        document.getElementById('enquiryForm').onsubmit = (e) => {
            e.preventDefault();
            emailjs.send("service_zn289y8", "template_g6ozwsm", {
                course_name: cart.join(', '),
                name: document.getElementById('name').value,
                email: document.getElementById('email').value,
                phone: document.getElementById('phone').value
            }).then(() => { alert("Enquiry Sent!"); localStorage.clear(); window.location.href='index.html'; });
        };
    </script>
</body>
</html>
