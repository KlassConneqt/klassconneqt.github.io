<!DOCTYPE html>
<html lang="en">
<head>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script>(function(){ emailjs.init("a-SkplDQ-6DlInywr"); })();</script>
</head>
<body>
    <nav>...</nav>
    <div style="padding:50px;">
        <h2>Your Cart</h2>
        <ul id="cart-list"></ul>
        <form id="enquiryForm">
            <input type="text" id="name" placeholder="Name" required>
            <input type="email" id="email" placeholder="Email" required>
            <button type="submit" class="btn btn-primary">Submit Enquiry</button>
        </form>
    </div>
    <script>
        const cart = JSON.parse(localStorage.getItem('cart') || '[]');
        document.getElementById('cart-list').innerHTML = cart.map(item => `<li>${item}</li>`).join('');
        
        document.getElementById('enquiryForm').onsubmit = (e) => {
            e.preventDefault();
            emailjs.send("service_zn289y8", "template_g6ozwsm", {
                name: document.getElementById('name').value,
                email: document.getElementById('email').value,
                course_name: cart.join(', '),
                message: "Cart Enquiry"
            }).then(() => alert("Enquiry Sent!"));
        };
    </script>
</body>
</html>
