<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Gallery | KlassConneqt</title>
    <style>
        body { font-family: sans-serif; padding: 50px 5%; }
        .gallery-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
        .gallery-item img { width: 100%; height: 250px; object-fit: cover; border-radius: 8px; }
    </style>
</head>
<body>
    <h2 style="text-align: center; margin-bottom: 40px;">Company Gallery</h2>
    <div class="gallery-grid" id="gallery-container">Loading...</div>
    <script>
        // REPLACE THIS URL WITH YOUR NEW WEB APP URL IF YOU NEED TO ADD A GALLERY TAB
        const GALLERY_API = "YOUR_GOOGLE_SCRIPT_URL"; 
        async function loadGallery() {
            const container = document.getElementById('gallery-container');
            const res = await fetch(GALLERY_API);
            const items = await res.json();
            container.innerHTML = items.map(i => `
                <div class="gallery-item">
                    <img src="${i.ImageURL}" alt="${i.Caption}">
                    <p style="text-align:center; margin-top:10px;">${i.Caption}</p>
                </div>
            `).join('');
        }
        document.addEventListener('DOMContentLoaded', loadGallery);
    </script>
</body>
</html>
